<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin Shaw</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      text-align: center;
    }

    .card {
      padding: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      font-weight: 700;
    }

    p {
      margin-top: 10px;
      font-size: 1.1rem;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Kevin Shaw</h1>
    <p>Welcome to my personal website</p>
  </div>
</body>
</html>
